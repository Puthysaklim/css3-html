<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Exercise</title>
</head>
<style>
    .container {
        margin-left: 15px;
        margin-top: 3px;
    }

    h3 {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: 32px;
    }

    button {
        border: 1px black solid;
        border-radius: 10px;
        padding: 10px 18px;
        color: white;
        background-color: rgb(10, 14, 223);
        margin-left: 10px;
    }

    .btn2 {
        border: 1px black groove;
        border-radius: 5px;
        padding: 10px 18px;
        color: white;
        background-color: black;

    }

    .btn3 {
        border: 1px blue solid;
        border-radius: 50px;
        padding: 10px 18px;
        color: blue;
        background-color: transparent;

    }

    .btn4 {
        border: 1px black solid;
        border-radius: 50px;
        padding: 10px 18px;
        color: white;
        background-color: rgb(242, 65, 213);
        cursor: pointer;
        transition: all 0.3s;
    }

    .btn4:hover {
        background-color: transparent;
        color: blue;
        outline: 3px; blue solid
    }

    .btn5 {
        border: 1px black solid;
        border-radius: 50px;
        padding: 10px 18px;
        color: white;
        background-color: brown;
        cursor: pointer;
        transition: all 0.3s;
    }

    .btn5:hover {
        background-color: rgb(241, 101, 101);
    }

    .btn6 {
        outline: none;
        border-radius: 50px;
        padding: 10px 18px;
        color: black;
        background-color: transparent;
        cursor: pointer;
        transition: all 0.3s;
    }
        /* hover=after effect */
    .btn6:hover {
        background-color: transparent;
        color: blue;
        outline: 2px blue solid;
    }
    .btn7 {
        outline: yellow;
        border-radius: 50px;
        padding: 10px 18px;
        color: black;
        background-color: transparent;
        cursor: pointer;
        transition: all 0.3s;
    }
       
    .btn7:hover {
        background-color: transparent;
        color: blue;
        outline: 2px blue solid;
        transform: scale(1.1);
    }

    .btn8 {
        outline: none;
        border-radius: 50px;
        padding: 10px 18px;
        color: rgb(236, 230, 230);
        background-color: rgb(230, 13, 157);
        cursor: pointer;
        transition: all 0.3s;
    }  
    .btn8:hover {
        background-color: rgb(234, 51, 51);
        color: white;
        outline: 2px solid;
        transform:scale(0.9); 
    }

    .btn9 {
        outline: none;
        border-radius: 50px;
        padding: 10px 18px;
        color: black;
        background-color: burlywood;
        cursor: crosshair;
        transition: all 0.3s;
    } 
    .btn9:hover {
        background-color: rgb(231, 232, 224);
        color: rgb(27, 26, 26);
        outline: 2px transparent  solid;
        transform:  rotate(7deg);
    }
</style>

<body>
    <!-- BTN1 -->
    <div class="container">
        <h3>Primary</h3>
        <button class="btn1">Primary1</button>
        <button class="btn2">Primary2</button>
        <button class="btn3">Primary3</button>
    </div>

    <!-- BTN2 -->
    <div class="container">
        <h3>Primary</h3>
        <button class="btn4">Primary1</button>
        <button class="btn5">Primary2</button>
        <button class="btn6">Primary3</button>
    </div>

    <!-- BTN3 -->
    <div class="container">
        <h3>Primary</h3>
        <button class="btn7">Primary1</button>
        <button class="btn8">Primary2</button>
        <button class="btn9">Primary3</button>
    </div>
</body>

</html>
